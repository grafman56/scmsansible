[defaults]
# Network devices: no SSH facts, no retry files, parallelism cranked up.
host_key_checking   = False
gathering           = explicit
forks               = 50
retry_files_enabled = False
stdout_callback     = yaml
interpreter_python  = auto_silent

[persistent_connection]
# network_cli holds one SSH session per device for the whole run.
connect_timeout = 60
command_timeout = 60
